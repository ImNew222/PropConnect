    <style>
        * {
            transition: 0.5s ease;

        body {

        /* Common style for all skeleton elements */
        .skeleton {
            background-color: #e0e0e0;
            border-radius: 4px;
            /* The Animation Magic */
            position: relative;
            overflow: hidden;
        }

        /* The Shimmer Animation Effect */
        .skeleton::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            /* A gradient that moves from left to right */
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.5) 50%,
                    rgba(255, 255, 255, 0) 100%);
            /* Move the shimmer */
            transform: translateX(-100%);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }

        /* Specific Sizes for Skeleton Parts */
        .skeleton-img {
            height: 150px;
            width: 100%;
            margin-bottom: 15px;
        }

        .skeleton-title {
            height: 24px;
            width: 80%;
            margin-bottom: 10px;
        }

        .skeleton-text {
            height: 16px;
            width: 100%;
            margin-bottom: 6px;
            min-width: 50px;
        }

        .skeleton-text:last-child {
            width: 60%;
            /* Make the last line shorter for realism */
        }

        .withAnimation {
            position: relative;
            /* left: -100dvh; */
            top: 0;
            transition: 0.5s ease;
            transform: scale(0);
        }
    </style>
