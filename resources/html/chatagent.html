<script type="module">
    // 1. Import Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
        getDatabase,
        ref,
        push,
        query,
        limitToLast,
        onChildAdded,
        get,
        orderByKey,
        endBefore,
        startAfter,
        remove,
        limitToFirst
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";



    let currentUID;



    // 2. Your Firebase Configuration (set these values from your Firebase Console)
    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.firebasestorage.app",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // 3. Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let targetUID;

    // --- AUTH STATE LISTENER ---

    // Config


    // const ROOM_ID = "room1";
    // const ROOM_ID = localStorage.targetMessageRoom;
    const PAGE_SIZE = 20;
    let messagesRef;

    const messageRef1 = ref(db, `rooms/messages`)



    // UI Elements
    const listEl = document.getElementById('messages-list');
    const inputEl = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const loaderEl = document.getElementById('loading-msg');

    // State
    let oldestKey = null; // Tracks the top-most message key for pagination
    let isLoading = false;
    let isAllHistoryLoaded = false;
    let fromDeleteFunction = false;

    // ---------------------------------------------------------
    // 2. LISTEN FOR NEW MESSAGES (AND INITIAL 20)
    // ---------------------------------------------------------


    let recentQuery;

    recentQuery = query(messageRef1, limitToLast(PAGE_SIZE));

    messagesRef = messageRef1;




    onChildAdded(recentQuery, (snapshot) => {
        const msg = snapshot.val();
        const key = snapshot.key;

        // If this message is already in DOM (from pagination), skip it
        if (document.getElementById(key)) return;

        // Append to bottom
        if (fromDeleteFunction) {
            renderMessage(key, msg.text, true, msg.senderID, msg.timestamp);
        } else {
            renderMessage(key, msg.text, false, msg.senderID, msg.timestamp);
        }
        fromDeleteFunction = false;

        // Track the oldest key for our first pagination cursor
        // (Logic: If we have no oldestKey yet, the first one that arrives is the oldest)
        if (!oldestKey) oldestKey = key;

        // Auto-scroll to bottom on new message
        listEl.scrollTop = listEl.scrollHeight;

        console.log("New message added with key:", key);
    });



    // // Input strings
    // const string1 = "6GKyhHiTr5RiLvS0pRD2eo8hgvB3";
    // const string2 = "Te3DKu7kvBV1Ok9ZWjN1SpQb7uc2";

    // // Run the function
    // const result = compareFirstChar(string1, string2);
    // console.log("-".repeat(30));
    // console.log(result);








    // ---------------------------------------------------------
    // 3. FETCH OLDER MESSAGES (PAGINATION)
    // ---------------------------------------------------------

    async function loadMoreMessages() {
        if (isLoading || isAllHistoryLoaded || !oldestKey) return;

        isLoading = true;
        loaderEl.style.display = 'block';

        // Save current scroll height to restore position later
        const currentHeight = listEl.scrollHeight;

        // Query: Give me 20 messages that end BEFORE the oldest one I currently have
        const oldQuery = query(
            messagesRef,
            orderByKey(),
            endBefore(oldestKey),
            limitToLast(PAGE_SIZE)
        );

        try {
            const snapshot = await get(oldQuery);

            if (!snapshot.exists()) {
                isAllHistoryLoaded = true;
                loaderEl.textContent = "Start of conversation";
                return;
            }

            const updates = [];
            snapshot.forEach(child => {
                updates.push({ key: child.key, ...child.val() });
            });

            // If we got data, the first item in this new batch becomes the new "oldestKey"
            if (updates.length > 0) {
                oldestKey = updates[0].key;
            }

            // Render them at the TOP (reverse order because forEach gives oldest first)
            // We iterate normally but use prepend in renderMessage
            updates.reverse().forEach(msg => {
                renderMessage(msg.key, msg.text, true, msg.senderID, msg.timestamp); // true = prepend
            });

            // RESTORE SCROLL POSITION
            // The scroll moved to 0 because we added items. We need to push it back down 
            // by the amount of height we just added.
            const newHeight = listEl.scrollHeight;
            listEl.scrollTop = newHeight - currentHeight;

        } catch (error) {
            console.error("Error loading history:", error);
        } finally {
            isLoading = false;
            if (!isAllHistoryLoaded) loaderEl.style.display = 'none';
        }
    }

    // ---------------------------------------------------------
    // 4. SCROLL DETECTION
    // ---------------------------------------------------------
    listEl.addEventListener('scroll', () => {
        // If scrolled to top (scrollTop is 0)
        if (listEl.scrollTop === 0) {
            loadMoreMessages();
        }
    });

    // ---------------------------------------------------------
    // 5. HELPER FUNCTIONS
    // ---------------------------------------------------------



    function renderMessage(id, text, prepend, senderID, timestamp) {
        const div = document.createElement('div');
        div.className = 'message';
        div.id = id;
        div.textContent = text;

        // 1. Create a Date object
        const date = new Date(timestamp);

        // 2. Convert to a readable string (uses your local time zone)
        console.log(date.toLocaleString());


        if (senderID === "agent") {
            div.className = "flex items-end gap-3 justify-end group";
            div.innerHTML = `
                <div class="flex flex-col gap-1 items-end max-w-[80%]">
                    <div
                        class="relative bg-primary px-4 py-3 rounded-2xl rounded-br-sm text-white text-[15px] leading-relaxed shadow-md shadow-primary/20">
                        ${text}
                    </div>
                    <span class="text-[10px] text-slate-400 mr-1 opacity-75 group-hover:opacity-100 transition-opacity">${date.toLocaleTimeString()}</span>
                </div>
                <!-- User Avatar (Optional/Hidden for cleaner look often, but included as per component spec) -->
                <div class="bg-center bg-no-repeat bg-cover rounded-full w-8 h-8 shrink-0 shadow-sm border border-slate-100 dark:border-slate-700"
                    data-alt="Portrait of a male user in business attire"
                    style='background-image: url("https://www.svgrepo.com/show/527946/user-circle.svg");'>
                </div>
            `;
        } else {

            div.className = "flex items-end gap-3 group";
            div.innerHTML = `
                <div class="bg-center bg-no-repeat bg-cover rounded-full w-8 h-8 shrink-0 shadow-sm border border-slate-100 dark:border-slate-700"
                    data-alt="Professional portrait of a concierge assistant smiling warmly"
                    style='background-image: url("https://www.svgrepo.com/show/527946/user-circle.svg");'>
                </div>
                <div class="flex flex-col gap-1 items-start max-w-[80%]">
                    <div class="flex items-baseline gap-2 ml-1">
                        <span class="text-slate-500 dark:text-slate-400 text-[11px] font-medium">Customer</span>
                    </div>
                    <div
                        class="relative bg-slate-100 dark:bg-surface-dark px-4 py-3 rounded-2xl rounded-bl-sm text-slate-800 dark:text-slate-200 text-[15px] leading-relaxed shadow-sm">
                        ${text}
                    </div>
                    <span class="text-[10px] text-slate-400 ml-1 opacity-0 group-hover:opacity-100 transition-opacity">${date.toLocaleTimeString()}</span>
                </div>
        `;
        }



        if (prepend) {
            // Add to top (after the loader)
            // insertBefore the first message currently in the list
            const firstMsg = listEl.querySelector('.message');
            if (firstMsg) {
                listEl.insertBefore(div, firstMsg);
            } else {
                listEl.appendChild(div);
            }
        } else {
            // Add to bottom
            listEl.appendChild(div);
        }


    }

    // Send Message Logic
    sendBtn.addEventListener('click', () => {
        if (!inputEl.value.trim()) return;
        push(messagesRef, {
            text: inputEl.value,
            senderID: "agent",
            timestamp: Date.now()
        });
        inputEl.value = '';
        inputEl.focus();
    });

    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });

    window.onload = function () {
        document.getElementById('chatMateName').innerText = "Customer";
    };
